<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Flowing circular arc representing habits loop -->
  <path d="M 16 4 A 12 12 0 1 1 15.99 4" stroke="url(#logo-grad)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" />
  <!-- Completed checkmark flying out representing progression -->
  <path d="M 12 16.5 L 15 19.5 L 21 12.5" stroke="url(#logo-grad-2)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" />
  <defs>
    <linearGradient id="logo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed" />
      <stop offset="100%" stop-color="#9333ea" />
    </linearGradient>
    <linearGradient id="logo-grad-2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9333ea" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>
  </defs>
</svg>
